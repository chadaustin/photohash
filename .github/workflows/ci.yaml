on: [push, pull_request]

name: CI

env:
  RUST_BACKTRACE: 1

jobs:
  ubuntu:
    strategy:
      matrix:
        image:
          - ubuntu-26.04
          - ubuntu-24.04
          - ubuntu-22.04
          # TODO: Figure out how to install libheif on macOS.
          # - macos-latest # ARM
          # - macos-13 # Intel
          # Windows will require extra attention.
          # - windows-latest

    runs-on: ${{ matrix.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Ubuntu packages
        run: sudo apt install -y libheif-dev libsqlite3-dev nasm libheif-plugin-libde265
      - run: cargo test

  build-windows:
    runs-on: windows-latest
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up MSVC environment
        uses: step-security/msvc-dev-cmd@v1
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install CMake 3.x
        shell: pwsh
        run: |
          python -m pip install cmake==3.31.6
          $cmake = python -c "import shutil; print(shutil.which('cmake') or '')"
          if (-not $cmake) {
            throw "pip installed cmake, but cmake.exe was not found on PATH"
          }
          Split-Path $cmake | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $cmake --version
      - name: Install nasm
        run: choco install nasm -y
      - name: Install cargo-vcpkg
        run: cargo install cargo-vcpkg
      - name: Build vcpkg dependencies
        shell: pwsh
        run: |
          Remove-Item Env:VCPKG_ROOT -ErrorAction SilentlyContinue
          cmake --version
          cargo vcpkg build 2>&1 | Tee-Object -FilePath vcpkg-build.log
          exit $LASTEXITCODE
      - name: Dump vcpkg logs on failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path .\vcpkg-build.log) {
            Write-Host "===== cargo vcpkg build output ====="
            Get-Content .\vcpkg-build.log -Tail 400
          }

          if (Test-Path .\target\vcpkg\buildtrees) {
            Get-ChildItem .\target\vcpkg\buildtrees -Recurse -File |
              Where-Object { $_.Name -match '^(stdout|stderr|config-.+-(out|err))-.+\.log$' } |
              Sort-Object FullName |
              ForEach-Object {
                Write-Host "===== $($_.FullName) ====="
                Get-Content $_.FullName -Tail 300
              }
          }
      - name: Build project
        shell: pwsh
        run: |
          Remove-Item Env:VCPKG_ROOT -ErrorAction SilentlyContinue
          cargo build
